services:
  homecache:
    build: .
    container_name: homecache
    ports:
      - "${HOMECACHE_PORT:-8000}:8000"
    volumes:
      - ${HOMECACHE_DATA_DIR:-./data}:/data
    environment:
      - DATABASE_URL=sqlite:////data/inventory.db
      - BASE_URL=${BASE_URL:-http://localhost:8000}
    restart: unless-stopped
